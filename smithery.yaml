startCommand:
  type: http
  configSchema:
    type: object
    required: ["discordToken"]
    properties:
      discordToken:
        type: string
        title: "Discord Bot Token"
        description: "Discord bot token. Obtain this from the Discord Developer Portal."
  commandFunction: |
    config => ({
      command: 'node', 
      args: ['./build/index.js', '--transport', 'shttp', '--port', '8080'], 
      env: {DISCORD_TOKEN: config.discordToken}
    })